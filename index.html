<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>

    <h1 id="header" >Library</h1>

    <div
        id="library-collection"
    >
        <button
            id="new-book-button"
        >
        Add Book
        </button>

        <div
        class="new-book-section"        
    >
        <p>Fill in details for new book then click add button</p>
        <input 
            class="new-book-details" 
            id="new-book-title-input"
            placeholder="Book Title"
        >
        <input 
            class="new-book-details" 
            id="new-book-author-input"
            placeholder="Book Author"
        >
        <input
            class="new-book-details"
            id="new-book-read-status"
            placeholder="Have you read this book?"
        >
        

    </div>

        <h2
            id="library-collection-header"
        >
            Your Book Collection
        </h2>

        <div
            id="book-card-section"
        >

        </div>
    </div>

    

    
</body>
</html>
